name: Release

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.17.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
      - name: Verify release version
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          node --input-type=module <<'NODE'
          import { readFileSync } from 'node:fs';
          const manifest = JSON.parse(readFileSync('manifest.json', 'utf8'));
          const packageJson = JSON.parse(readFileSync('package.json', 'utf8'));
          const versions = JSON.parse(readFileSync('versions.json', 'utf8'));
          const tag = process.env.RELEASE_TAG;
          if (manifest.version !== tag || packageJson.version !== tag || !versions[tag]) {
            throw new Error(`Release tag ${tag} does not match package metadata`);
          }
          NODE
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${{ github.ref_name }}" main.js manifest.json styles.css --title "Masonry ${{ github.ref_name }}" --generate-notes --verify-tag
